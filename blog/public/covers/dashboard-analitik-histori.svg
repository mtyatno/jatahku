  <text x="675" y="320" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.45)">Sel</text>
  <text x="715" y="320" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.45)">Rab</text>
  <text x="755" y="320" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.45)">Kam</text>
  <text x="795" y="320" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#BA7517">Jum</text>
  <text x="835" y="320" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.45)">Sab</text>
