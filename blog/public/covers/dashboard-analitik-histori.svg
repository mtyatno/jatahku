  <text x="172" y="84" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="white" letter-spacing="1.5">UPDATE FITUR</text>

  <text x="60" y="210" font-family="Georgia,serif" font-size="52" font-weight="700" fill="white">Dashboard</text>
  <text x="60" y="272" font-family="Georgia,serif" font-size="52" font-weight="700" fill="white">Analitik</text>
  <text x="60" y="330" font-family="Georgia,serif" font-size="42" font-weight="700" fill="rgba(255,255,255,0.75)">Histori &amp; Pola</text>

  <text x="60" y="400" font-family="system-ui,sans-serif" font-size="19" fill="rgba(255,255,255,0.55)">4 fitur baru · April 2026</text>

