<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A4F3E"/>
      <stop offset="100%" stop-color="#116653"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="980" cy="100" r="260" fill="rgba(255,255,255,0.04)"/>
  <circle cx="150" cy="530" r="180" fill="rgba(255,255,255,0.03)"/>

  <!-- White card -->
  <rect x="580" y="80" width="560" height="470" rx="36" fill="rgba(255,255,255,0.09)"/>

  <!-- Clock face -->
  <circle cx="860" cy="295" r="150" fill="none" stroke="white" stroke-width="7"/>
  <!-- Clock ticks -->
  <line x1="860" y1="155" x2="860" y2="175" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <line x1="860" y1="415" x2="860" y2="435" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <line x1="720" y1="295" x2="740" y2="295" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <line x1="980" y1="295" x2="1000" y2="295" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- Hour hand -->
  <line x1="860" y1="295" x2="860" y2="200" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="860" y1="295" x2="930" y2="295" stroke="#4ADE80" stroke-width="5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="860" cy="295" r="10" fill="white"/>
  <!-- Pause icon below clock -->
  <rect x="830" y="460" width="18" height="50" rx="5" fill="rgba(255,255,255,0.7)"/>
  <rect x="862" y="460" width="18" height="50" rx="5" fill="rgba(255,255,255,0.7)"/>

  <!-- Left content -->
  <rect x="60" y="60" width="225" height="38" rx="19" fill="rgba(255,255,255,0.15)"/>
  <text x="172" y="84" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="white" letter-spacing="1.5">UPDATE FITUR</text>

  <text x="60" y="200" font-family="Georgia,serif" font-size="52" font-weight="700" fill="white">Cooling</text>
  <text x="60" y="265" font-family="Georgia,serif" font-size="52" font-weight="700" fill="white">Period:</text>
  <text x="60" y="330" font-family="Georgia,serif" font-size="40" font-weight="700" fill="rgba(255,255,255,0.85)">Anti Belanja</text>
  <text x="60" y="385" font-family="Georgia,serif" font-size="40" font-weight="700" fill="rgba(255,255,255,0.85)">Impulsif</text>

  <text x="60" y="580" font-family="Georgia,serif" font-size="26" font-weight="700" fill="rgba(255,255,255,0.85)">Jatahku</text>
  <text x="170" y="580" font-family="system-ui,sans-serif" font-size="17" fill="rgba(255,255,255,0.45)">jatahku.com</text>
</svg>
