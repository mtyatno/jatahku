<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A4F3E"/>
      <stop offset="100%" stop-color="#116653"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="980" cy="100" r="260" fill="rgba(255,255,255,0.04)"/>
  <circle cx="150" cy="530" r="180" fill="rgba(255,255,255,0.03)"/>

  <!-- White card -->
  <rect x="580" y="80" width="560" height="470" rx="36" fill="rgba(255,255,255,0.09)"/>

  <!-- House roof -->
  <polygon points="860,150 1020,290 700,290" fill="none" stroke="white" stroke-width="6" stroke-linejoin="round"/>
  <!-- House body -->
  <rect x="720" y="285" width="280" height="190" rx="4" fill="none" stroke="white" stroke-width="6"/>
  <!-- Door -->
  <rect x="825" y="370" width="70" height="110" rx="8" fill="rgba(255,255,255,0.25)"/>
  <!-- Window left -->
  <rect x="735" y="310" width="55" height="55" rx="6" fill="rgba(255,255,255,0.2)"/>
  <!-- Window right -->
  <rect x="930" y="310" width="55" height="55" rx="6" fill="rgba(255,255,255,0.2)"/>
  <!-- Person 1 -->
  <circle cx="790" cy="200" r="22" fill="rgba(255,255,255,0.5)"/>
  <path d="M 760 250 Q 790 225 820 250" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="5" stroke-linecap="round"/>
  <!-- Person 2 -->
  <circle cx="930" cy="200" r="22" fill="rgba(255,255,255,0.5)"/>
  <path d="M 900 250 Q 930 225 960 250" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="5" stroke-linecap="round"/>

  <!-- Left content -->
  <rect x="60" y="60" width="200" height="38" rx="19" fill="rgba(255,255,255,0.15)"/>
  <text x="160" y="84" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="white" letter-spacing="1.5">TUTORIAL</text>

  <text x="60" y="200" font-family="Georgia,serif" font-size="52" font-weight="700" fill="white">Budget</text>
  <text x="60" y="265" font-family="Georgia,serif" font-size="52" font-weight="700" fill="white">Bersama</text>
  <text x="60" y="330" font-family="Georgia,serif" font-size="52" font-weight="700" fill="white">Keluarga</text>
  <text x="60" y="390" font-family="system-ui,sans-serif" font-size="20" fill="rgba(255,255,255,0.6)">Fitur Household</text>

  <text x="60" y="580" font-family="Georgia,serif" font-size="26" font-weight="700" fill="rgba(255,255,255,0.85)">Jatahku</text>
  <text x="170" y="580" font-family="system-ui,sans-serif" font-size="17" fill="rgba(255,255,255,0.45)">jatahku.com</text>
</svg>
