<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A4F3E"/>
      <stop offset="100%" stop-color="#116653"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="980" cy="100" r="260" fill="rgba(255,255,255,0.04)"/>
  <circle cx="150" cy="530" r="180" fill="rgba(255,255,255,0.03)"/>

  <!-- White card -->
  <rect x="580" y="80" width="560" height="470" rx="36" fill="rgba(255,255,255,0.09)"/>

  <!-- Calendar -->
  <rect x="685" y="140" width="350" height="280" rx="16" fill="none" stroke="white" stroke-width="6"/>
  <!-- Calendar header -->
