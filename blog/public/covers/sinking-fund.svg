  <rect x="685" y="175" width="350" height="30" fill="rgba(255,255,255,0.2)"/>
  <!-- Calendar rings -->
  <rect x="745" y="122" width="14" height="40" rx="7" fill="white"/>
  <rect x="860" y="122" width="14" height="40" rx="7" fill="white"/>
  <rect x="975" y="122" width="14" height="40" rx="7" fill="white"/>
  <!-- Calendar title -->
  <text x="860" y="182" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="white">April 2026</text>
  <!-- Grid days -->
  <rect x="705" y="230" width="40" height="35" rx="6" fill="rgba(255,255,255,0.1)"/>
  <rect x="755" y="230" width="40" height="35" rx="6" fill="rgba(255,255,255,0.1)"/>
  <rect x="805" y="230" width="40" height="35" rx="6" fill="rgba(255,255,255,0.1)"/>
  <rect x="855" y="230" width="40" height="35" rx="6" fill="rgba(255,255,255,0.1)"/>
  <rect x="905" y="230" width="40" height="35" rx="6" fill="rgba(255,255,255,0.1)"/>
  <rect x="955" y="230" width="40" height="35" rx="6" fill="rgba(255,255,255,0.25)"/>
  <!-- Checkmark on highlighted day -->
  <polyline points="963,248 973,260 985,240" fill="none" stroke="#4ADE80" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Second row -->
  <rect x="705" y="280" width="40" height="35" rx="6" fill="rgba(255,255,255,0.1)"/>
  <rect x="755" y="280" width="40" height="35" rx="6" fill="rgba(255,255,255,0.1)"/>
  <rect x="805" y="280" width="40" height="35" rx="6" fill="rgba(255,255,255,0.1)"/>
  <rect x="855" y="280" width="40" height="35" rx="6" fill="rgba(255,255,255,0.1)"/>
  <!-- Third row -->
  <rect x="705" y="330" width="40" height="35" rx="6" fill="rgba(255,255,255,0.1)"/>
  <rect x="755" y="330" width="40" height="35" rx="6" fill="rgba(255,255,255,0.1)"/>

  <!-- Coins stacked below -->
  <ellipse cx="760" cy="455" rx="50" ry="14" fill="rgba(255,255,255,0.25)"/>
  <ellipse cx="760" cy="438" rx="50" ry="14" fill="rgba(255,255,255,0.3)"/>
  <ellipse cx="760" cy="421" rx="50" ry="14" fill="rgba(255,255,255,0.35)"/>
  <text x="760" y="427" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#0F6E56">Rp</text>
  <ellipse cx="870" cy="455" rx="50" ry="14" fill="rgba(255,255,255,0.15)"/>
  <ellipse cx="870" cy="438" rx="50" ry="14" fill="rgba(255,255,255,0.2)"/>
  <ellipse cx="870" cy="421" rx="50" ry="14" fill="rgba(255,255,255,0.25)"/>
  <text x="870" y="427" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#0F6E56">Rp</text>
  <ellipse cx="980" cy="455" rx="50" ry="14" fill="rgba(255,255,255,0.1)"/>
  <ellipse cx="980" cy="438" rx="50" ry="14" fill="rgba(255,255,255,0.15)"/>
  <ellipse cx="980" cy="421" rx="50" ry="14" fill="rgba(255,255,255,0.2)"/>
  <text x="980" y="427" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#0F6E56">Rp</text>

  <!-- Left content -->
  <rect x="60" y="60" width="200" height="38" rx="19" fill="rgba(255,255,255,0.15)"/>
  <text x="160" y="84" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="white" letter-spacing="1.5">TUTORIAL</text>

  <text x="60" y="200" font-family="Georgia,serif" font-size="52" font-weight="700" fill="white">Sinking</text>
  <text x="60" y="265" font-family="Georgia,serif" font-size="52" font-weight="700" fill="white">Fund</text>
  <text x="60" y="340" font-family="system-ui,sans-serif" font-size="21" fill="rgba(255,255,255,0.6)">Siapkan tagihan tahunan</text>
  <text x="60" y="370" font-family="system-ui,sans-serif" font-size="21" fill="rgba(255,255,255,0.6)">tanpa kaget</text>

  <text x="60" y="580" font-family="Georgia,serif" font-size="26" font-weight="700" fill="rgba(255,255,255,0.85)">Jatahku</text>
  <text x="170" y="580" font-family="system-ui,sans-serif" font-size="17" fill="rgba(255,255,255,0.45)">jatahku.com</text>
