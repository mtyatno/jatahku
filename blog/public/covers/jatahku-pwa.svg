<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A4F3E"/>
      <stop offset="100%" stop-color="#116653"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="980" cy="100" r="260" fill="rgba(255,255,255,0.04)"/>
  <circle cx="150" cy="530" r="180" fill="rgba(255,255,255,0.03)"/>

  <!-- White card -->
  <rect x="580" y="80" width="560" height="470" rx="36" fill="rgba(255,255,255,0.09)"/>

  <!-- Phone outline -->
  <rect x="765" y="130" width="190" height="350" rx="24" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="5"/>
  <!-- Phone screen -->
  <rect x="780" y="155" width="160" height="290" rx="10" fill="rgba(255,255,255,0.12)"/>
  <!-- Notch -->
  <rect x="835" y="135" width="50" height="10" rx="5" fill="rgba(255,255,255,0.4)"/>
  <!-- Home button -->
  <circle cx="860" cy="500" r="12" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="3"/>

  <!-- App grid on screen -->
  <rect x="793" y="168" width="38" height="38" rx="8" fill="rgba(255,255,255,0.25)"/>
  <rect x="841" y="168" width="38" height="38" rx="8" fill="#0F6E56"/>
  <text x="860" y="193" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="800" fill="white">J</text>
  <rect x="889" y="168" width="38" height="38" rx="8" fill="rgba(255,255,255,0.25)"/>
  <rect x="793" y="216" width="38" height="38" rx="8" fill="rgba(255,255,255,0.25)"/>
  <rect x="841" y="216" width="38" height="38" rx="8" fill="rgba(255,255,255,0.25)"/>
  <rect x="889" y="216" width="38" height="38" rx="8" fill="rgba(255,255,255,0.25)"/>
  <!-- Mini progress bars on screen -->
  <rect x="793" y="275" width="134" height="8" rx="4" fill="rgba(255,255,255,0.1)"/>
  <rect x="793" y="275" width="80" height="8" rx="4" fill="rgba(255,255,255,0.5)"/>
  <rect x="793" y="295" width="134" height="8" rx="4" fill="rgba(255,255,255,0.1)"/>
  <rect x="793" y="295" width="110" height="8" rx="4" fill="rgba(255,255,255,0.4)"/>
  <rect x="793" y="315" width="134" height="8" rx="4" fill="rgba(255,255,255,0.1)"/>
  <rect x="793" y="315" width="55" height="8" rx="4" fill="rgba(255,255,255,0.3)"/>

  <!-- Add to home screen arrow + icon -->
  <rect x="1000" y="310" width="90" height="90" rx="20" fill="rgba(255,255,255,0.2)"/>
  <line x1="1045" y1="350" x2="1045" y2="378" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <polyline points="1028,365 1045,348 1062,365" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="1025" y1="390" x2="1065" y2="390" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Arrow from phone to add button -->
  <path d="M 970 355 Q 990 355 1000 355" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3" stroke-dasharray="6,4"/>

  <!-- PWA badge -->
  <rect x="660" y="460" width="100" height="36" rx="8" fill="#0D6B52"/>
  <text x="710" y="483" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="800" fill="white">PWA</text>

  <!-- Left content -->
  <rect x="60" y="60" width="225" height="38" rx="19" fill="rgba(255,255,255,0.15)"/>
  <text x="172" y="84" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="white" letter-spacing="1.5">UPDATE FITUR</text>

  <text x="60" y="200" font-family="Georgia,serif" font-size="52" font-weight="700" fill="white">Install</text>
  <text x="60" y="265" font-family="Georgia,serif" font-size="52" font-weight="700" fill="white">Jatahku</text>
  <text x="60" y="325" font-family="Georgia,serif" font-size="52" font-weight="700" fill="white">di HP</text>
  <text x="60" y="390" font-family="system-ui,sans-serif" font-size="20" fill="rgba(255,255,255,0.6)">Seperti app native</text>

  <text x="60" y="580" font-family="Georgia,serif" font-size="26" font-weight="700" fill="rgba(255,255,255,0.85)">Jatahku</text>
  <text x="170" y="580" font-family="system-ui,sans-serif" font-size="17" fill="rgba(255,255,255,0.45)">jatahku.com</text>
