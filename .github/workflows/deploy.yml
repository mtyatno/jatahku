name: Deploy Jatahku

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: sudo /opt/jatahku/deploy.sh

      - name: Health check
        run: |
          echo "Waiting for service to be ready..."
          sleep 15
          for i in {1..5}; do
            RESPONSE=$(curl -sL --max-time 10 https://api.jatahku.com/health 2>&1 || true)
            STATUS=$(curl -sL -o /dev/null -w "%{http_code}" --max-time 10 https://api.jatahku.com/health 2>/dev/null || echo "000")
            echo "Attempt $i: HTTP $STATUS — $RESPONSE"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1

      - name: Notify Telegram on failure
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${CHAT_ID}\", \"text\": \"❌ Deploy Jatahku GAGAL\n\nCommit: ${{ github.sha }}\nPesan: ${{ github.event.head_commit.message }}\n\nDetail: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"

  deploy-blog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: blog/package-lock.json

      - name: Build blog
        working-directory: blog
        run: npm ci && npm run build

      - name: SCP blog dist to /tmp on VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          source: "blog/dist/"
          target: "/tmp/blog-dist-new/"
          strip_components: 2

      - name: Move blog to web root via sudo
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: |
            sudo rsync -a --delete /tmp/blog-dist-new/ /home/jatahku/web/blog.jatahku.com/public_html/
            sudo rm -rf /tmp/blog-dist-new/
