name: Deploy Jatahku

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: sudo /opt/jatahku/deploy.sh

      - name: Health check
        run: |
          echo "Waiting for service to be ready..."
          sleep 5
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://jatahku.com/health)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, retrying in 5s..."
            sleep 5
          done
          echo "Health check failed after 5 attempts"
          exit 1

      - name: Notify Telegram on failure
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${CHAT_ID}\", \"text\": \"❌ Deploy Jatahku GAGAL\n\nCommit: ${{ github.sha }}\nPesan: ${{ github.event.head_commit.message }}\n\nDetail: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
